name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-api:
    name: Test Payment API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: payment-api/package-lock.json

      - name: Install dependencies
        working-directory: payment-api
        run: npm ci

      - name: Run tests
        working-directory: payment-api
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/test'
          DIRECT_URL: 'postgresql://postgres:postgres@localhost:5432/test'
          JWT_SECRET: 'test-secret-for-ci'
          STELLAR_NETWORK: 'testnet'
          SOROBAN_RPC_URL: 'https://soroban-testnet.stellar.org'
          SOROBAN_CONTRACT_ID: 'CCPLACEHOLDER'

  lint-dashboard:
    name: Lint Merchant Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: merchant-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: merchant-dashboard
        run: npm ci

      - name: Lint
        working-directory: merchant-dashboard
        run: npm run lint -- --max-warnings 0 || true
