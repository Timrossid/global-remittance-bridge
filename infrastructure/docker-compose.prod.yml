version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: payment_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network

  payment-api:
    image: ghcr.io/global-micro-remittance-bridge/payment-api:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/payment_api
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      STELLAR_SECRET: ${STELLAR_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    networks:
      - app-network

  indexer:
    image: ghcr.io/global-micro-remittance-bridge/transaction-indexer:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/payment_api
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
