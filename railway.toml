[build]
builder = "NIXPACKS"
buildCommand = "cd payment-api && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "cd payment-api && npx prisma migrate deploy && node dist/payment-api/src/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
